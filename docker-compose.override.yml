services:
  platform-backend:
    volumes:
      - ./secrets:/app/secrets:ro
  ai-engine:
    environment:
      - NVIDIA_VISIBLE_DEVICES=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['1']
              capabilities: [gpu]
  processor:
    volumes:
      - ./data/captures:/app/data_captures:rw
