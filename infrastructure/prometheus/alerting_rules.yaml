# DAS Pipeline Alerting Rules
# Load into Prometheus via prometheus.yml: rule_files: ["alerting_rules.yaml"]

groups:
  - name: das_pipeline_health
    interval: 30s
    rules:
      # Service availability
      - alert: ServiceDown
        expr: up{job=~"das-processor|ai-engine"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} has been down for more than 1 minute."

      # High error rate
      - alert: HighErrorRate
        expr: rate(errors_total{service_name=~"das-processor|ai-engine"}[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate in {{ $labels.service_name }}"
          description: "{{ $labels.service_name }} is experiencing {{ printf \"%.2f\" $value }} errors/sec (threshold: 0.1/sec)."

      # Critical error rate
      - alert: CriticalErrorRate
        expr: rate(errors_total{service_name=~"das-processor|ai-engine"}[5m]) > 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Critical error rate in {{ $labels.service_name }}"
          description: "{{ $labels.service_name }} is experiencing {{ printf \"%.2f\" $value }} errors/sec (threshold: 1/sec)."

  - name: das_pipeline_performance
    interval: 30s
    rules:
      # High processing latency
      - alert: HighProcessingLatency
        expr: histogram_quantile(0.95, rate(message_processing_duration_seconds_bucket{service_name="das-processor"}[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High processing latency in {{ $labels.service_name }}"
          description: "p95 processing latency is {{ printf \"%.0f\" (mul $value 1000) }}ms (threshold: 100ms)."

      # High AI inference latency
      - alert: HighAIInferenceLatency
        expr: histogram_quantile(0.95, rate(ai_inference_duration_seconds_bucket{service_name="ai-engine"}[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High AI inference latency"
          description: "p95 DTAN inference latency is {{ printf \"%.1f\" $value }}s (threshold: 5s)."

      # Critical AI inference latency
      - alert: CriticalAIInferenceLatency
        expr: histogram_quantile(0.95, rate(ai_inference_duration_seconds_bucket{service_name="ai-engine"}[5m])) > 15
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical AI inference latency"
          description: "p95 DTAN inference latency is {{ printf \"%.1f\" $value }}s (threshold: 15s). Pipeline may be backing up."

  - name: das_pipeline_kafka
    interval: 30s
    rules:
      # High consumer lag
      - alert: HighConsumerLag
        expr: kafka_consumer_lag_messages{service_name=~"das-processor|ai-engine"} > 10000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High consumer lag in {{ $labels.service_name }}"
          description: "{{ $labels.service_name }} has {{ $value }} messages of lag on {{ $labels.topic }}/{{ $labels.partition }}."

      # Critical consumer lag
      - alert: CriticalConsumerLag
        expr: kafka_consumer_lag_messages{service_name=~"das-processor|ai-engine"} > 100000
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical consumer lag in {{ $labels.service_name }}"
          description: "{{ $labels.service_name }} has {{ $value }} messages of lag. Data may be significantly delayed."

      # DLQ depth increasing
      - alert: DLQDepthIncreasing
        expr: increase(dlq_depth_messages{service_name=~"das-processor|ai-engine"}[15m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "DLQ depth increasing in {{ $labels.service_name }}"
          description: "{{ $labels.service_name }} DLQ has {{ $value }} new messages in 15 minutes. Check for processing errors."

      # Critical DLQ depth
      - alert: CriticalDLQDepth
        expr: dlq_depth_messages{service_name=~"das-processor|ai-engine"} > 100
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical DLQ depth in {{ $labels.service_name }}"
          description: "{{ $labels.service_name }} DLQ has {{ $value }} messages. Immediate attention required."

  - name: das_pipeline_circuit_breakers
    interval: 15s
    rules:
      # Circuit breaker open
      - alert: CircuitBreakerOpen
        expr: circuit_breaker_state{service_name=~"das-processor|ai-engine"} == 2
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Circuit breaker OPEN in {{ $labels.service_name }}"
          description: "{{ $labels.breaker_name }} circuit breaker is OPEN in {{ $labels.service_name }}. Service may be degraded."

      # Circuit breaker half-open (recovering)
      - alert: CircuitBreakerHalfOpen
        expr: circuit_breaker_state{service_name=~"das-processor|ai-engine"} == 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Circuit breaker recovering in {{ $labels.service_name }}"
          description: "{{ $labels.breaker_name }} circuit breaker is HALF_OPEN (recovering) in {{ $labels.service_name }}."

  - name: das_ai_engine_specific
    interval: 30s
    rules:
      # Buffer evictions (potential memory pressure)
      - alert: BufferEvictionsHigh
        expr: rate(buffer_evictions_total{service_name="ai-engine"}[5m]) * 60 > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High buffer eviction rate in AI engine"
          description: "AI engine is evicting {{ printf \"%.1f\" $value }} buffers/min. May indicate memory pressure or too many concurrent fibers."

      # No vehicles detected (potential data quality issue)
      - alert: NoVehiclesDetected
        expr: rate(ai_vehicles_detected_total{service_name="ai-engine"}[30m]) == 0 and rate(ai_windows_processed_total{service_name="ai-engine"}[30m]) > 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "No vehicles detected for 30 minutes"
          description: "AI engine is processing windows but detecting no vehicles on fiber {{ $labels.fiber_id }}. Check sensor data quality or calibration."

      # Low detection rate
      - alert: LowDetectionRate
        expr: histogram_quantile(0.5, rate(ai_detections_per_window_bucket{service_name="ai-engine"}[30m])) < 0.1 and rate(ai_windows_processed_total{service_name="ai-engine"}[30m]) > 0
        for: 30m
        labels:
          severity: info
        annotations:
          summary: "Low vehicle detection rate"
          description: "Median detections per window is {{ printf \"%.2f\" $value }}. May be expected during low traffic periods."

  - name: das_data_flow
    interval: 1m
    rules:
      # No data flowing through processor
      - alert: NoDataFlowProcessor
        expr: rate(messages_processed_total{service_name="das-processor"}[10m]) == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "No data flowing through processor"
          description: "das-processor has not processed any messages in 10 minutes. Check upstream data sources."

      # No data flowing through AI engine
      - alert: NoDataFlowAIEngine
        expr: rate(ai_windows_processed_total{service_name="ai-engine"}[10m]) == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "No data flowing through AI engine"
          description: "ai-engine has not processed any windows in 10 minutes. Check processor output and kafka connectivity."

      # Throughput drop
      - alert: ThroughputDrop
        expr: rate(messages_processed_total{service_name="das-processor"}[5m]) < 0.5 * avg_over_time(rate(messages_processed_total{service_name="das-processor"}[5m])[1h:5m])
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Throughput dropped significantly"
          description: "Processor throughput has dropped to {{ printf \"%.0f\" (mul $value 100 | divf (avg_over_time(rate(messages_processed_total{service_name="das-processor"}[5m])[1h:5m])) ) }}% of hourly average."
