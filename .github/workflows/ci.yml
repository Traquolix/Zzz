name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1" # Weekly Monday 07:00 UTC — dependency security scan

env:
  PYTHON_VERSION: "3.10"
  NODE_VERSION: "22"

jobs:
  # ---------- LINT + TYPECHECK ----------
  lint:
    # Run on push, schedule, and PRs from this repo only (block fork PRs to protect self-hosted runners)
    if: >
      github.event_name != 'schedule' &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install ruff

      - name: Lint pipeline
        run: cd services/pipeline && ruff check . && ruff format --check .

      - name: Lint backend
        run: cd services/platform/backend && ruff check . && ruff format --check .

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/platform/frontend/package-lock.json
      - run: cd services/platform/frontend && npm ci

      - name: Lint frontend
        run: cd services/platform/frontend && npm run lint

      - name: Typecheck frontend
        run: cd services/platform/frontend && npx tsc -p tsconfig.app.json --noEmit

  # ---------- UNIT TESTS (self-hosted — requires PyTorch + model weights) ----------
  test:
    if: >
      github.event_name != 'schedule' &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: [self-hosted, backend]
    steps:
      - uses: actions/checkout@v6

      - name: Ensure pipeline venv + dependencies
        run: |
          make setup-pipeline
          services/pipeline/.venv/bin/python -c "import torch" 2>/dev/null || \
            services/pipeline/.venv/bin/pip install torch==2.5.1 --index-url https://download.pytorch.org/whl/cu124 -q
          services/pipeline/.venv/bin/python -c "import matplotlib" 2>/dev/null || \
            services/pipeline/.venv/bin/pip install -e "services/pipeline[ai]" -q

      - name: Run AI engine tests
        run: make test-ai-engine
        env:
          CUDA_VISIBLE_DEVICES: ""

  # ---------- SECURITY (weekly only) ----------
  security:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: pip install pip-audit bandit

      - name: pip-audit backend
        run: pip-audit -r services/platform/backend/requirements.txt

      - name: Bandit scan pipeline
        run: bandit -r services/pipeline/shared services/pipeline/processor services/pipeline/ai_engine services/pipeline/config -q -ll --skip B608

      - name: Bandit scan backend
        run: bandit -r services/platform/backend/apps services/platform/backend/sequoia -q -ll --skip B608

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/platform/frontend/package-lock.json

      - name: npm audit frontend
        run: cd services/platform/frontend && npm audit --audit-level=high
