name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_PIPELINE_VERSION: "3.10"
  PYTHON_BACKEND_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  # ---------- LINT ----------
  lint-pipeline:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/pipeline
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_PIPELINE_VERSION }}
          cache: pip
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  lint-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/platform/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_BACKEND_VERSION }}
          cache: pip
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/platform/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/platform/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  # ---------- TYPECHECK ----------
  typecheck-frontend:
    runs-on: ubuntu-latest
    needs: lint-frontend
    defaults:
      run:
        working-directory: services/platform/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/platform/frontend/package-lock.json
      - run: npm ci
      - run: npx tsc -p tsconfig.app.json --noEmit

  # ---------- UNIT TESTS ----------
  test-pipeline:
    runs-on: ubuntu-latest
    needs: lint-pipeline
    defaults:
      run:
        working-directory: services/pipeline
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_PIPELINE_VERSION }}
          cache: pip
      - run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - run: pytest tests/ -v --tb=short --ignore=tests/integration

  test-backend:
    runs-on: ubuntu-latest
    needs: lint-backend
    defaults:
      run:
        working-directory: services/platform/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_BACKEND_VERSION }}
          cache: pip
      - run: sudo apt-get update && sudo apt-get install -y librdkafka-dev libpq-dev
      - run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest tests/ -v --tb=short
        env:
          DJANGO_SETTINGS_MODULE: sequoia.settings.test

  test-frontend:
    runs-on: ubuntu-latest
    needs: lint-frontend
    defaults:
      run:
        working-directory: services/platform/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/platform/frontend/package-lock.json
      - run: npm ci
      - run: npm run test

  # ---------- DOCKER BUILD ----------
  docker-build:
    runs-on: ubuntu-latest
    needs: [test-pipeline, test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build processor image
        run: docker build -f services/pipeline/processor/Dockerfile services/pipeline
      - name: Build backend image
        run: docker build -f services/platform/backend/Dockerfile services/platform/backend
      - name: Build frontend image
        run: |
          docker build -f services/platform/frontend/Dockerfile services/platform/frontend \
            --build-arg VITE_API_URL=http://localhost:8001 \
            --build-arg VITE_MAPBOX_TOKEN=pk.test_token_for_ci

  # ---------- SECURITY ----------
  security:
    runs-on: ubuntu-latest
    needs: [test-pipeline, test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_BACKEND_VERSION }}

      - name: Install security tools
        run: pip install pip-audit bandit

      - name: pip-audit backend
        run: pip-audit -r services/platform/backend/requirements.txt
        continue-on-error: true

      - name: Bandit scan pipeline
        run: bandit -r services/pipeline/shared services/pipeline/processor services/pipeline/ai_engine services/pipeline/config -q -ll

      - name: Bandit scan backend
        run: bandit -r services/platform/backend/apps services/platform/backend/sequoia -q -ll

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/platform/frontend/package-lock.json

      - name: npm audit frontend
        run: cd services/platform/frontend && npm audit --audit-level=high
        continue-on-error: true
