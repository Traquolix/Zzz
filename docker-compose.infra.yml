# Shared infrastructure — runs once and survives app restarts.
# Start with: docker compose -f docker-compose.infra.yml up -d
# Or via Makefile: make up-infra

services:

  # Single-broker Kafka in KRaft mode. Suitable for development and small deployments.
  # For production HA, scale to 3+ brokers with replication-factor > 1.
  kafka:
    image: confluentinc/cp-kafka:7.8.4
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"      # External access for DAS interrogators
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "2.0"
        reservations:
          memory: 2G
          cpus: "0.5"
    environment:
      # KRaft mode (no Zookeeper needed)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT_EXTERNAL://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      # External listener advertises server IP for DAS access; Internal for Docker services
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_EXTERNAL://${KAFKA_EXTERNAL_HOST:-localhost}:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_EXTERNAL:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: sequoia-cluster
      # Retention: 24 hours (time-based only)
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 536870912
      KAFKA_LOG_CLEANUP_POLICY: delete
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 60000
      KAFKA_MESSAGE_MAX_BYTES: 2097152  # 2MB
      KAFKA_REPLICA_FETCH_MAX_BYTES: 2097152  # 2MB
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 2097152  # 2MB
    volumes:
      # Production: bind mount to persistent volume
      # This prevents data loss on container restart
      - ${KAFKA_DATA_PATH:-kafka_data}:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks: [ internal ]

  kafka-setup:
    image: confluentinc/cp-kafka:7.8.4
    container_name: kafka-setup
    restart: on-failure:5
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
        echo 'Waiting for Kafka DNS to resolve...' &&
        for i in 1 2 3 4 5 6; do getent hosts kafka && break || sleep 5; done &&
        echo 'Waiting for Kafka to be ready...' &&
        cub kafka-ready -b kafka:29092 1 30 &&
        echo 'Creating Kafka topics (1 partition — DAS streams require strict ordering)...' &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic das.raw.carros --partitions 1 --replication-factor 1 --config retention.ms=3600000 --config compression.type=lz4 --config max.message.bytes=2097152 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic das.raw.mathis --partitions 1 --replication-factor 1 --config retention.ms=3600000 --config compression.type=lz4 --config max.message.bytes=2097152 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic das.raw.promenade --partitions 1 --replication-factor 1 --config retention.ms=3600000 --config compression.type=lz4 --config max.message.bytes=2097152 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic das.processed --partitions 1 --replication-factor 1 --config retention.ms=86400000 --config compression.type=lz4 --config max.message.bytes=2097152 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic das.detections --partitions 1 --replication-factor 1 --config retention.ms=86400000 --config compression.type=lz4 --config max.message.bytes=2097152 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic das.dlq --partitions 1 --replication-factor 1 --config retention.ms=604800000 --config compression.type=lz4 --config max.message.bytes=2097152 &&
        echo 'Creating preprod topics...' &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic preprod.processed --partitions 1 --replication-factor 1 --config retention.ms=86400000 --config compression.type=lz4 --config max.message.bytes=2097152 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic preprod.detections --partitions 1 --replication-factor 1 --config retention.ms=86400000 --config compression.type=lz4 --config max.message.bytes=2097152 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic preprod.dlq --partitions 1 --replication-factor 1 --config retention.ms=604800000 --config compression.type=lz4 --config max.message.bytes=2097152 &&
        echo 'All Kafka topics created successfully'
      "
    networks:
      - internal

  schema-registry:
    image: confluentinc/cp-schema-registry:7.8.4
    hostname: schema-registry
    container_name: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
      kafka-setup:
        condition: service_completed_successfully
    ports:
      - "8081:8081"  # Exposed for external DAS hardware
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'kafka:29092'
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC: _schemas
      SCHEMA_REGISTRY_SCHEMA_REGISTRY_INTER_INSTANCE_PROTOCOL: "http"
      SCHEMA_REGISTRY_LOG4J_ROOT_LOGLEVEL: INFO
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka_ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"    # Admin UI — localhost only
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: sequoia-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
    networks: [ internal ]

  # PostgreSQL for Django (multi-tenant user/org/fiber data)
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    ports:
      - "127.0.0.1:5432:5432"    # Localhost only for local development
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sequoia}
      POSTGRES_USER: ${POSTGRES_USER:-sequoia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME}
    volumes:
      - ${POSTGRES_DATA_PATH:-postgres_data}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sequoia} -d ${POSTGRES_DB:-sequoia}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks: [ internal ]

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"    # Localhost only for local development
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.1"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly no
      --requirepass ${REDIS_PASSWORD:-CHANGE_ME}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-CHANGE_ME}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [ internal ]

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: clickhouse
    restart: unless-stopped
    # Ports exposed for local development only.
    # In production, remove these and access ClickHouse only via the internal network.
    ports:
      - "127.0.0.1:8123:8123"    # HTTP interface (localhost only)
      - "127.0.0.1:9000:9000"    # Native TCP interface (localhost only)
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "2.0"
        reservations:
          memory: 2G
          cpus: "0.5"
    environment:
      CLICKHOUSE_DB: sequoia
      CLICKHOUSE_USER: sequoia
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - ${CLICKHOUSE_DATA_PATH:-clickhouse_data}:/var/lib/clickhouse
      - ./infrastructure/clickhouse/init:/docker-entrypoint-initdb.d:ro
      - ./infrastructure/clickhouse/cables:/opt/fiber_cables:ro
      - ./infrastructure/clickhouse/config/logging.xml:/etc/clickhouse-server/config.d/z_logging.xml:ro
      - ./infrastructure/clickhouse/config/backup_disk.xml:/etc/clickhouse-server/config.d/backup_disk.xml:ro
      - clickhouse_backups:/backups
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [ internal ]

  otel-lgtm:
    image: grafana/otel-lgtm:0.19.1
    container_name: otel-lgtm
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3000"    # Grafana — localhost only
      # Telemetry receivers: no external ports needed, accessed via internal network
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.25"
    environment:
      - ENABLE_LOGS_GRAFANA=true
      - ENABLE_METRICS_GRAFANA=true
      - ENABLE_TRACES_GRAFANA=true
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
      - CLICKHOUSE_GRAFANA_PASSWORD=${CLICKHOUSE_GRAFANA_PASSWORD:-CHANGE_ME_GRAFANA}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=localhost,127.0.0.1,kafka,clickhouse,redis,schema-registry,platform-backend,otel-lgtm
    volumes:
      - otel_data:/data
      - ./infrastructure/tempo/tempo-config.yaml:/otel-lgtm/tempo-config.yaml:ro
      - ./infrastructure/otel/otelcol-config.yaml:/otel-lgtm/otelcol-config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./infrastructure/grafana/provisioning/dashboards:/otel-lgtm/grafana/conf/provisioning/dashboards:ro
      - ./infrastructure/grafana/provisioning/datasources:/otel-lgtm/grafana/conf/provisioning/datasources:ro
      - ./infrastructure/grafana/dashboards:/otel-lgtm/grafana/dashboards:ro
    networks: [ internal ]

networks:
  default:
    name: sequoia-default
  internal:
    name: sequoia-internal

volumes:
  kafka_data:
  clickhouse_data:
  clickhouse_backups:
  redis_data:
  postgres_data:
  otel_data:
