# DAS pipeline services — processor and ai-engine.
# Start with: docker compose -f docker-compose.pipeline.yml up -d
# Or via Makefile: make up-pipeline
# Requires: make up-infra (Kafka, Schema Registry must be reachable on sequoia-internal)

services:

  # Single processor handles all fibers via topic pattern subscription (das.raw.*).
  processor:
    build:
      context: services/pipeline
      dockerfile: processor/Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    container_name: ${CONTAINER_PREFIX:-}processor
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4.0'
    environment:
      TOPIC_PREFIX: ${TOPIC_PREFIX:-prod}
      ENVIRONMENT: ${ENVIRONMENT:-prod}
      STARTUP_SKIP_MESSAGES: ${STARTUP_SKIP_MESSAGES:-0}
      no_proxy: localhost,127.0.0.1,kafka,schema-registry,otel-lgtm
      NO_PROXY: localhost,127.0.0.1,kafka,schema-registry,otel-lgtm
    env_file: .env
    volumes:
      - ./data/captures:/app/data_captures:rw
    networks: [ internal ]

  # Separate consumer groups ensure parallel processing.
  ai-engine:
    build:
      context: services/pipeline
      dockerfile: ai_engine/Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    container_name: ${CONTAINER_PREFIX:-}ai-engine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 16G
          cpus: '8.0'
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['1']
              capabilities: [gpu]
    env_file: .env
    environment:
      TOPIC_PREFIX: ${TOPIC_PREFIX:-prod}
      ENVIRONMENT: ${ENVIRONMENT:-prod}
      AI_MODEL_BASE_PATH: /app/ai_engine/model_vehicle/models_parameters
      CALIBRATION_PATH: /app/calibration
      VISUALIZATION_OUTPUT: /app/visualizations
      NVIDIA_VISIBLE_DEVICES: 1
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      OMP_NUM_THREADS: "4"
      MKL_NUM_THREADS: "4"
      no_proxy: localhost,127.0.0.1,kafka,schema-registry,otel-lgtm
      NO_PROXY: localhost,127.0.0.1,kafka,schema-registry,otel-lgtm
    volumes:
      - ${CALIBRATION_DATA_PATH:-./data/calibration}:/app/calibration:ro
      - ${VISUALIZATION_OUTPUT_PATH:-./data/visualizations}:/app/visualizations:rw
    networks: [ internal ]

networks:
  internal:
    external: true
    name: sequoia-internal
