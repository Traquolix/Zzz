# Central fiber/section/model configuration
# Adding a new fiber: add entry here + JSON cable file + configure DAS hardware
# Config auto-reloads on file change (no restart needed)
#
# Naming conventions:
#   - fiber: A physical fiber optic cable installation
#   - section: A contiguous range of channels processed together (with its own model)
#   - temporal_decimation: Reduce sampling rate (e.g., 125Hz -> 10.4167Hz)
#   - spatial_decimation: Reduce channel count (e.g., keep every Nth channel)

# =============================================================================
# Service Infrastructure Defaults
# =============================================================================
# Infrastructure settings for all services. Can be overridden per-service below.
# Environment variables always take precedence: KAFKA_BOOTSTRAP_SERVERS, SCHEMA_REGISTRY_URL

service_defaults:
  # Kafka infrastructure (overridden by env vars in production)
  kafka_bootstrap_servers: kafka:29092
  schema_registry_url: http://schema-registry:8081

  # Topic naming
  topics:
    raw_pattern: "^das\\.raw\\.[^.]+$"    # Input pattern for processor (excludes .params)
    processed: das.processed           # Output from processor, input to ai_engine
    detections: das.detections           # Unified detection output (speed + count + vehicle type)
    dlq: das.dlq                       # Dead letter queue

  # Schema paths (relative to pipeline root / PYTHONPATH).
  schemas:
    processor:
      output_key: shared/schema/string_key.avsc
      output_value: processor/schema/das_processed_measurement.avsc
    ai_engine:
      detection_key: shared/schema/string_key.avsc
      detection_value: ai_engine/schema/das_detection.avsc

  # Producer settings (shared across services)
  producer:
    batch_size: 131072
    linger_ms: 100
    compression_type: lz4
    acks: all
    retries: 3
    enable_idempotence: true
    flush_threshold: 10
    flush_interval: 1.0

# =============================================================================
# Service-Specific Settings
# =============================================================================
# Override service_defaults for specific services

services:
  processor:
    name: das-processor
    max_concurrent_messages: 50
    message_timeout_seconds: 30.0

  ai_engine:
    name: ai-engine
    max_concurrent_messages: 10
    message_timeout_seconds: 120.0
    buffer_timeout_seconds: 60.0
    max_active_buffers: 15

# =============================================================================
# Defaults
# =============================================================================
# Applied to all sections unless overridden per-section.
# Processing pipeline order: scale → bandpass → temporal decimation → spatial decimation

defaults:
  model: dtan_unified

  pipeline:
    - step: scale
      params:
        factor: 213.05   # 1/dataScale — convert physical units (rad/(s*m)) to ADC counts
    - step: bandpass_filter
      params:
        low_freq_hz: 0.3
        high_freq_hz: 2.0
        order: 4
    - step: temporal_decimation
      params:
        factor: 12    # 125Hz -> 10.4167Hz
    - step: spatial_decimation
      params:
        factor: 3     # Keep every 3rd channel

# =============================================================================
# Fibers Configuration
# =============================================================================
# Sections inherit model and pipeline from defaults above.
# Override per-section only when a section needs different processing.

fibers:
  carros:
    input_topic: das.raw.carros
    total_channels: 2830
    sampling_rate_hz: 125.0

    sections:
      - name: seg1
        channels: [1200, 1716]
      - name: seg2
        channels: [1716, 2232]
      - name: seg3
        channels: [2232, 2748]

  # mathis:
  #   input_topic: das.raw.mathis
  #   total_channels: 5428
