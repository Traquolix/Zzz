# Central fiber/section/model configuration
# Adding a new fiber: add entry here + fiber_cables table + configure DAS hardware
# Config auto-reloads on file change (no restart needed)
#
# Naming conventions:
#   - fiber: A physical fiber optic cable installation
#   - section: A contiguous range of channels processed together (with its own model)
#   - temporal_decimation: Reduce sampling rate (e.g., 50Hz -> 10Hz)
#   - spatial_decimation: Reduce channel count (e.g., keep every Nth channel)

# =============================================================================
# Service Infrastructure Defaults
# =============================================================================
# Infrastructure settings for all services. Can be overridden per-service below.
# Environment variables always take precedence: KAFKA_BOOTSTRAP_SERVERS, SCHEMA_REGISTRY_URL

service_defaults:
  # Kafka infrastructure (overridden by env vars in production)
  kafka_bootstrap_servers: kafka:29092
  schema_registry_url: http://schema-registry:8081

  # Topic naming
  topics:
    raw_pattern: "^das\\.raw\\.[^.]+$"    # Input pattern for processor (excludes .params)
    processed: das.processed           # Output from processor, input to ai_engine
    speeds: das.speeds                 # Speed analysis output
    counts: das.counts                 # Vehicle counting output
    dlq: das.dlq                       # Dead letter queue

  # Schema paths (relative to pipeline root / PYTHONPATH).
  schemas:
    processor:
      output_key: schema/string_key.avsc
      output_value: processor/schema/das_processed_measurement.avsc
    ai_engine:
      speed_key: schema/string_key.avsc
      speed_value: ai_engine/schema/das_speed_analysis.avsc
      count_key: schema/string_key.avsc
      count_value: ai_engine/schema/das_vehicle_count.avsc

  # Producer settings (shared across services)
  producer:
    batch_size: 131072
    linger_ms: 100
    compression_type: lz4
    acks: all
    retries: 3
    enable_idempotence: true
    flush_threshold: 10
    flush_interval: 1.0

# =============================================================================
# Service-Specific Settings
# =============================================================================
# Override service_defaults for specific services

services:
  processor:
    name: das-processor
    max_concurrent_messages: 50
    message_timeout_seconds: 30.0

  ai_engine:
    name: ai-engine
    max_concurrent_messages: 10
    message_timeout_seconds: 120.0
    buffer_timeout_seconds: 60.0
    max_active_buffers: 10

# =============================================================================
# Fibers Configuration
# =============================================================================

fibers:
  carros:
    input_topic: das.raw.carros
    total_channels: 2829
    sampling_rate_hz: 50.0

    sections:
      - name: default
        channels: [1000, 2700]
        model: dtan_carros

        # Processing pipeline - steps executed in order (matches notebook experiment 12)
        # Order: bandpass → temporal decimation → spatial decimation → CMR
        pipeline:
          - step: bandpass_filter
            params:
              low_freq_hz: 0.3
              high_freq_hz: 2.0
              order: 4
              warmup_seconds: 5.0

          - step: temporal_decimation
            params:
              factor: 5  # 50Hz -> 10Hz

          - step: spatial_decimation
            params:
              factor: 3  # Keep every 3rd channel (1700 -> 567 channels)

          - step: common_mode_removal
            params:
              warmup_seconds: 5.0
              method: median

  mathis:
    input_topic: das.raw.mathis
    total_channels: 5427  # Full ROI: raw channels 19892-47027, /5 ROI decimation = 5427
    sampling_rate_hz: 50.0

    sections:
      # Section 1: Channels 0-1700 of Mathis ROI (covers active vehicle zone)
      - name: section1
        channels: [0, 1700]
        model: dtan_mathis_section1

        pipeline:
          - step: bandpass_filter
            params:
              low_freq_hz: 0.3
              high_freq_hz: 2.0
              order: 4
              warmup_seconds: 5.0

          - step: temporal_decimation
            params:
              factor: 5  # 50Hz -> 10Hz

          - step: spatial_decimation
            params:
              factor: 3  # Keep every 3rd channel (1700 -> 567 channels)

          - step: common_mode_removal
            params:
              warmup_seconds: 5.0
              method: median

      # Section 2: Channels 2500-3000 of Mathis ROI (second active vehicle zone)
      - name: section2
        channels: [2500, 3000]
        model: dtan_mathis_section2

        pipeline:
          - step: bandpass_filter
            params:
              low_freq_hz: 0.3
              high_freq_hz: 2.0
              order: 4
              warmup_seconds: 5.0

          - step: temporal_decimation
            params:
              factor: 5  # 50Hz -> 10Hz

          - step: spatial_decimation
            params:
              factor: 3  # Keep every 3rd channel (500 -> 167 channels)

          - step: common_mode_removal
            params:
              warmup_seconds: 5.0
              method: median

  promenade:
    input_topic: das.raw.promenade
    total_channels: 7694  # Full ROI: raw channels 47848-86319, /5 ROI decimation = 7694
    sampling_rate_hz: 50.0

    sections:
      - name: default
        channels: [0, 4100]
        model: dtan_promenade

        pipeline:
          - step: bandpass_filter
            params:
              low_freq_hz: 0.3
              high_freq_hz: 2.0
              order: 4
              warmup_seconds: 5.0

          - step: temporal_decimation
            params:
              factor: 5  # 50Hz -> 10Hz

          - step: spatial_decimation
            params:
              factor: 3  # Keep every 3rd channel (4100 -> 1367 channels)

          - step: common_mode_removal
            params:
              warmup_seconds: 5.0
              method: median

# =============================================================================
# Model Defaults
# =============================================================================
# Shared inference parameters - only override per-model where different.
# All models now use the unified bidirectional checkpoint from experiment 12.

model_defaults:
  path: ai_engine/model_vehicle/models_parameters
  exp_name: allignment_parameters_16_02_2026_fullSet_28s
  version: best
  type: dtan

  inference:
    sampling_rate_hz: 10.0
    window_seconds: 28  # Must match model checkpoint (fullSet_28s)
    channels_per_section: 9
    gauge_meters: 10
    bidirectional_rnn: true

  speed_detection:
    min_speed_kmh: 20.0
    max_speed_kmh: 120.0
    correlation_threshold: 500.0    # Per-pair threshold (summed = this x (Nch-1))
    use_calibration: false
    time_overlap_ratio: 0.5         # 50% overlap between windows
    glrt_window: 20
    bidirectional_detection: true
    speed_glrt_factor: 1.0          # Speed quality filter: require GLRT >= threshold * factor
    speed_weighting: median         # 'glrt' (GLRT-weighted) or 'median'
    speed_positive_glrt_only: false # Only use pairs with positive GLRT for speed

  counting:
    enabled: true
    window_seconds: 28  # Must match inference window
    classify_threshold_factor: 10.0   # Peak height > this * threshold = truck
    min_peak_distance_s: 0.25         # Min seconds between peaks

  visualization:
    enabled: true
    interval_seconds: 600
    output_dir: /app/visualizations

# =============================================================================
# Model Definitions
# =============================================================================
# Models are loaded lazily on first use.
# All models inherit from model_defaults above; only overrides listed here.

models:
  dtan_carros:
    fiber_id: carros
    speed_detection:
      use_calibration: true   # Calibration available for carros

  dtan_mathis_section1:
    fiber_id: mathis

  dtan_mathis_section2:
    fiber_id: mathis

  dtan_promenade:
    fiber_id: promenade

  # Legacy model - kept for backwards compatibility
  dtan_mathis:
    fiber_id: mathis

# =============================================================================
# Defaults
# =============================================================================
# Applied when not specified per-section

defaults:
  pipeline:
    - step: bandpass_filter
      params:
        low_freq_hz: 0.3
        high_freq_hz: 2.0
        order: 4
        warmup_seconds: 5.0
    - step: temporal_decimation
      params:
        factor: 5
    - step: spatial_decimation
      params:
        factor: 3
    - step: common_mode_removal
      params:
        warmup_seconds: 5.0
        method: median

  model: dtan_carros
