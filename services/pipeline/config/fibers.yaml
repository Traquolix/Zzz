# =============================================================================
# Model Defaults
# =============================================================================
# Shared inference parameters - only override per-model where different.

model_defaults:
  path: ai_engine/model_vehicle/models_parameters
  exp_name: allignment_parameters_3_03_2026_30s_windows
  version: best
  type: dtan

  inference:
    sampling_rate_hz: 10.4167   # = 125/12
    window_seconds: 30
    channels_per_section: 9
    gauge_meters: 15.3846       # = 5.128 * 3 (post spatial decimation)
    bidirectional_rnn: true

  speed_detection:
    min_speed_kmh: 20.0
    max_speed_kmh: 120.0
    correlation_threshold: 1100.0   # Per-pair threshold
    use_calibration: false
    time_overlap_ratio: 0.25
    glrt_window: 20
    bidirectional_detection: true
    speed_glrt_factor: 1.0
    speed_weighting: median
    speed_positive_glrt_only: false

  counting:
    enabled: true
    window_seconds: 30
    classify_threshold_factor: 50.0
    min_peak_distance_s: 1.2
    model_path: models_parameters/vehicle_counting_model.pt
    thresholds_path: models_parameters/detection_thresholds_adapted_sectionwise.csv
    mean_std_path: models_parameters/mean_std_features_adapted_sectionwise.csv
    truck_ratio_for_split: 2.0
    time_window_duration: 360
    corr_threshold: 500.0

  visualization:
    enabled: true
    interval_seconds: 600
    output_dir: /app/visualizations

# =============================================================================
# Model Definitions
# =============================================================================
# Single unified model for all fibers.

models:
  dtan_unified:
    fiber_id: null  # Works for all fibers
