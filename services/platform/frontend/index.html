<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sequoia-platform-handson</title>
  </head>
  <body>
    <script>
      // Apply saved theme class before first paint to prevent flash
      (function() {
        var theme = localStorage.getItem('sequoia_theme');
        if (theme === 'sequoia') document.documentElement.classList.add('sequoia');
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
