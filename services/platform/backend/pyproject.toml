[tool.ruff]
line-length = 100
target-version = "py312"
exclude = [".venv", "migrations", "manage.py"]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
exclude = ["migrations", ".venv", "tests"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "sequoia.settings.test"
testpaths = ["tests"]
python_files = "test_*.py"
