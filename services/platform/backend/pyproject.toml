[tool.ruff]
line-length = 100
target-version = "py310"
exclude = [".venv", "migrations", "manage.py"]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B", "SIM", "RUF", "C4"]
ignore = [
    "E501",    # Line too long - handled by formatter
    "RUF012",  # Mutable class default — false positives on Django model fields
    "RUF002",  # Ambiguous unicode in docstrings — French text is intentional
    "RUF003",  # Ambiguous unicode in comments — French text is intentional
]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
exclude = ["migrations", ".venv", "tests"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "sequoia.settings.test"
testpaths = ["tests"]
python_files = "test_*.py"
